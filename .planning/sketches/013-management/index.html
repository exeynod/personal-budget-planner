<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sketch 013 — Управление (top-level tab)</title>
<link rel="stylesheet" href="../themes/default.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: #05070b; color: var(--color-text); font-family: var(--font-sans); padding-top: 56px; min-height: 100vh; }

#variant-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; background: #0a0d13; border-bottom: 1px solid #1a1f2c; padding: 8px; display: flex; gap: 6px; font-family: var(--font-sans); font-size: 12px; }
.variant-tab { background: transparent; color: #94a0b8; border: 1px solid #232a3a; padding: 8px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap; }
.variant-tab.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); font-weight: 600; }
.variant { display: none; }
.variant.active { display: block; }

.frame { max-width: var(--tg-viewport); margin: 24px auto; background: var(--color-bg); border-radius: 28px; overflow: hidden; box-shadow: var(--shadow-lg); position: relative; min-height: 760px; padding: var(--space-4) var(--space-4) calc(var(--bottom-nav-height) + var(--safe-bottom) + 16px); font-family: var(--font-sans); }

/* PageTitle */
.pageTitle { padding: var(--space-3) 0 var(--space-4); }
.pageTitle h1 { margin: 0; font-size: var(--text-xl); font-weight: 700; color: var(--color-text); }
.pageTitle .sub { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }

/* Section title (uppercase muted) */
.sectionTitle { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: var(--space-4) 0 var(--space-2); padding: 0 var(--space-1); }

/* Menu item */
.menuItem { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-2); cursor: pointer; text-align: left; width: 100%; font-family: inherit; }
.menuItem:hover, .menuItem:active { background: var(--color-surface-2); }
.menuItem .icon { width: 36px; height: 36px; border-radius: var(--radius-sm); background: var(--color-primary-soft); color: var(--color-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.menuItem .icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.menuItem .body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.menuItem .ttl { font-size: var(--text-base); font-weight: 600; color: var(--color-text); }
.menuItem .desc { font-size: var(--text-xs); color: var(--color-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.menuItem .chev { color: var(--color-text-dim); font-size: 18px; flex-shrink: 0; line-height: 1; }
.menuItem .badge { padding: 2px 8px; border-radius: var(--radius-full); background: var(--color-bg-elevated); color: var(--color-text-muted); font-family: var(--font-mono); font-size: 11px; font-weight: 500; flex-shrink: 0; }
.menuItem.warn .icon { background: rgba(255,181,71,0.12); color: var(--color-warn); }

/* Compact variant: меньше высота, без описания */
.menuItem.compact { padding: var(--space-3) var(--space-4); }
.menuItem.compact .icon { width: 28px; height: 28px; }
.menuItem.compact .icon svg { width: 16px; height: 16px; }

/* Footer */
.footer { padding: var(--space-6) var(--space-2); text-align: center; }
.footer .ver { font-size: var(--text-xs); color: var(--color-text-dim); }
.footer .ver a { color: var(--color-primary); text-decoration: none; }

/* BottomNav */
.nav { position: absolute; bottom: 0; left: 0; right: 0; height: calc(var(--bottom-nav-height) + var(--safe-bottom)); background: var(--color-bg-elevated); border-top: 1px solid var(--color-border); display: flex; padding-bottom: var(--safe-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,0.3); }
.nav .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: transparent; border: 0; cursor: pointer; color: var(--color-text-muted); padding: 6px 0; font-family: inherit; }
.nav .tab.active { color: var(--color-primary); }
.nav .tab .ic svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.nav .tab.active .ic svg { stroke-width: 2; fill: currentColor; }
.nav .tab.ai .ic svg { stroke-width: 1.5; }
.nav .tab .lb { font-size: 10px; font-weight: 500; line-height: 1; }
</style>
</head>

<script>
function show(id, btn) {
  document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.variant-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('variant-' + id).classList.add('active');
  btn.classList.add('active');
}
</script>
