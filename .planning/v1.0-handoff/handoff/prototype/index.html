<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TG Budget · Maximal Poster — Прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  html, body, #root { margin: 0; min-height: 100%; background: #1a1a1d; }
  body { font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color:#fff; }
  *::-webkit-scrollbar { display: none; } * { scrollbar-width: none; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "yellow",
    "homeColor": "cream"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
(async () => {
  const files = ['tweaks-panel.jsx', 'poster-screens.jsx', 'poster-app.jsx'];
  for (const f of files) {
    const url = new URL(f, location.href);
    if (location.search) url.search = location.search;
    const r = await fetch(url);
    const t = await r.text();
    const out = Babel.transform(t, { presets: ['react'] }).code;
    new Function(out)();
  }
})();
</script>
</body>
</html>
