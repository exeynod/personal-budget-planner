name: Deploy

# Triggers on every push to master, AFTER the CI workflow finishes
# successfully. Manual dispatch is also available for re-deploys without
# new commits.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

# Serialize deploys: a second push waits for the first to finish instead
# of racing it. cancel-in-progress: false because aborting mid-deploy
# leaves containers in mixed-version state.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_run gives us a `conclusion` field; only deploy on success.
    # workflow_dispatch always runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      # The VPS is only reachable inside the user's tailnet. The runner
      # joins as an ephemeral device with tag:ci; ACL pins tag:ci → VPS:2222.
      # Auth keys are minted on the fly from the OAuth client.
      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      # The github-deploy key on the VPS is force-commanded
      # (command="/home/exy/.../deploy.sh" in authorized_keys), so the
      # exact SSH command doesn't matter — anything triggers deploy.sh.
      #
      # We assemble the production .env from GitHub Secrets here and pipe
      # it into deploy.sh via stdin. deploy.sh archives the old .env as
      # .env.old.<UTC-timestamp> and atomically swaps in the new one
      # before `docker compose build/up` reads it. Empty stdin (e.g.
      # operator running `ssh deploy` by hand) keeps the existing .env.
      - name: SSH deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          # Runtime secrets pushed to the VPS in this deploy.
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BUDGET_APP_PASSWORD: ${{ secrets.BUDGET_APP_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          OWNER_TG_ID: ${{ secrets.OWNER_TG_ID }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
          MINI_APP_URL: ${{ secrets.MINI_APP_URL }}
          # Non-secret config — overridable via repo Variables, with sensible
          # production defaults baked in here.
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          APP_TZ: ${{ vars.APP_TZ }}
          AI_MAX_CONTEXT_MESSAGES: ${{ vars.AI_MAX_CONTEXT_MESSAGES }}
        run: |
          set -euo pipefail
          # Disable bash xtrace so secret expansion never lands in the
          # workflow log. (GitHub Actions also masks `secrets.*` values
          # in any captured stdout, but defence in depth is cheap.)
          set +x

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Assemble .env content. DATABASE_URL / DATABASE_URL_SYNC /
          # ADMIN_DATABASE_URL are derived from the two passwords here so
          # we don't have to keep them in lockstep across N secrets.
          # Empty `${VAR:-default}` keeps overridable vars off when no
          # repo variable is set.
          ENV_PAYLOAD=$(cat <<EOF
          # AUTOGENERATED $(date -u +%FT%TZ) by deploy workflow run ${{ github.run_id }}
          # commit: ${{ github.sha }}
          # Do NOT edit by hand — change GitHub Secrets / Variables and re-run deploy.

          DB_PASSWORD=$DB_PASSWORD
          BUDGET_APP_PASSWORD=$BUDGET_APP_PASSWORD
          DATABASE_URL=postgresql+asyncpg://budget_app:$BUDGET_APP_PASSWORD@db:5432/budget_db
          DATABASE_URL_SYNC=postgresql://budget_app:$BUDGET_APP_PASSWORD@db:5432/budget_db
          ADMIN_DATABASE_URL=postgresql+asyncpg://budget:$DB_PASSWORD@db:5432/budget_db

          BOT_TOKEN=$BOT_TOKEN
          BOT_USERNAME=$BOT_USERNAME
          OWNER_TG_ID=$OWNER_TG_ID
          MINI_APP_URL=$MINI_APP_URL
          INTERNAL_TOKEN=$INTERNAL_TOKEN
          PUBLIC_DOMAIN=$PUBLIC_DOMAIN

          APP_TZ=${APP_TZ:-Europe/Moscow}
          LOG_LEVEL=${LOG_LEVEL:-INFO}
          LOG_FORMAT=json

          OPENAI_API_KEY=$OPENAI_API_KEY
          LLM_PROVIDER=openai
          LLM_MODEL=${LLM_MODEL:-gpt-4.1-mini}
          AI_MAX_CONTEXT_MESSAGES=${AI_MAX_CONTEXT_MESSAGES:-8}
          ENABLE_AI_CATEGORIZATION=true

          CLOUDFLARE_TUNNEL_TOKEN=$CLOUDFLARE_TUNNEL_TOKEN

          DEV_MODE=false
          EOF
          )

          do_ssh() {
              printf '%s' "$ENV_PAYLOAD" | ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 \
                  -o StrictHostKeyChecking=yes \
                  -o BatchMode=yes \
                  -o ConnectTimeout=15 \
                  -o ServerAliveInterval=15 \
                  "$SSH_USER@$SSH_HOST" \
                  deploy
          }

          # Self-healing two-pass deploy. After the first push of the
          # wrapper-pattern deploy.sh, the VPS still has the old monolithic
          # deploy.sh as the SSH force-command target. That old script
          # ignores stdin, runs `git fetch + reset --hard` (which now lands
          # the new deploy.sh + deploy_inner.sh on disk for next time), and
          # then proceeds with `compose build/up` against the stale .env —
          # so the migration fails. We catch that one-time failure and
          # retry: the second SSH connection invokes the freshly-installed
          # wrapper, which exec's deploy_inner.sh, which finally reads our
          # piped .env payload and brings the stack up cleanly.
          #
          # Steady state (wrapper already on VPS): pass 1 succeeds and
          # pass 2 is never attempted. No extra latency on normal deploys.
          if do_ssh; then
              echo "deploy succeeded on first pass"
          else
              echo "first pass failed (likely stale wrapper bootstrap); retrying once with the freshly-deployed wrapper..."
              sleep 3
              do_ssh
          fi
