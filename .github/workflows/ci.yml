name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ------------------------------------------------------------------
  # Backend: Python tests (pytest-asyncio + real PostgreSQL)
  # ------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 — postgres:16 base + pgvector extension
        # preinstalled. Required by alembic 0004 (CREATE EXTENSION vector)
        # and the AI categorization tests; postgres:16-alpine doesn't
        # ship the extension and the migration would fail on CI bring-up.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: budget_test
          POSTGRES_USER: budget
          POSTGRES_PASSWORD: budget
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U budget -d budget_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://budget:budget@localhost:5432/budget_test
      DATABASE_URL_SYNC: postgresql://budget:budget@localhost:5432/budget_test
      ADMIN_DATABASE_URL: postgresql+asyncpg://budget:budget@localhost:5432/budget_test
      BOT_TOKEN: "1234567890:test_bot_token_for_testing_only"
      OWNER_TG_ID: "123456789"
      INTERNAL_TOKEN: "test_internal_secret_token"
      # Required by alembic 0007 (Phase 12 D-11-07-02) — _resolve_app_password
      # rejects empty/`change_me*` values. CI uses an ephemeral throwaway
      # postgres service, so this is a hardcoded test placeholder, not a
      # secret. Production gets the real password via deploy.yml from
      # GitHub Secrets.
      BUDGET_APP_PASSWORD: "ci_test_app_password_not_a_secret_just_passes_validator"
      # Required by validate_production_settings whenever AI is enabled —
      # backend tests mock OpenAI calls, so a fake-looking key satisfies the
      # boot-time guard without ever leaving the runner.
      OPENAI_API_KEY: "sk-test-fake-key-for-ci-only"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --tb=short -q

  # ------------------------------------------------------------------
  # Frontend: TypeScript build check
  # ------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ------------------------------------------------------------------
  # Frontend: Playwright e2e tests
  # ------------------------------------------------------------------
  frontend-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
