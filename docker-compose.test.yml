# Integration test override — bind-mounts the tests/ tree into the api container
# and exposes the dev override (DEV_MODE=true). Combine with base + dev:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml up -d
#   docker compose exec -T api /app/.venv/bin/python -m pytest tests/ "$@"
#   docker compose down
#
# Tests that require a live database (test_subscriptions, test_settings,
# tests/ai/test_categorization.py with DB fixtures, tests/ai/test_tools.py)
# now run end-to-end inside the api container against the shared `db` service.
#
# The wrapper at `scripts/run-integration-tests.sh` automates the full lifecycle.

services:
  api:
    volumes:
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
